      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;

      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px;
      margin-bottom: 14px;
      background: #e87722;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.18s, transform 0.12s;
    }
    .btn-wa:hover {
      background: #cf6510;
      transform: scale(1.02);
    }
    .btn-wa:last-child { margin-bottom: 0; }
    .btn-wa svg {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      fill: #fff;
